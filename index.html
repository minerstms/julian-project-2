<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Julian Project 1 — Tap Target</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(165deg, #1a0a2e 0%, #2d1b4e 35%, #4a2c6a 65%, #3d2463 100%);
      min-height: 100vh;
      min-height: 100dvh;
      color: #f0e6ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      overflow-x: hidden;
    }
    h1 {
      font-size: clamp(22px, 5vw, 28px);
      margin-bottom: 0.5rem;
      text-align: center;
      font-weight: 700;
      color: #e9d5ff;
      text-shadow: 0 0 20px rgba(192, 132, 252, 0.4);
    }
    .subtitle {
      font-size: clamp(18px, 4vw, 24px);
      opacity: 0.95;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #ddd6fe;
    }
    .stats {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 360px;
      margin-bottom: 1.5rem;
      background: rgba(88, 28, 135, 0.35);
      padding: 1rem 1.25rem;
      border-radius: 20px;
      border: 2px solid rgba(192, 132, 252, 0.25);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: clamp(22px, 4.5vw, 28px);
      font-weight: 600;
    }
    .stat-row span:last-child {
      color: #c4b5fd;
      text-shadow: 0 0 12px rgba(196, 181, 253, 0.5);
    }
    .arena {
      position: relative;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1;
      background: rgba(30, 10, 50, 0.5);
      border-radius: 24px;
      border: 3px solid rgba(192, 132, 252, 0.3);
      box-shadow: inset 0 0 40px rgba(88, 28, 135, 0.3), 0 8px 32px rgba(0, 0, 0, 0.3);
      touch-action: manipulation;
      overflow: hidden;
    }
    .arena::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 21px;
      background: radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(88, 28, 135, 0.15) 100%);
      pointer-events: none;
    }
    .target {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #e9d5ff, #a855f7);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.35),
                  0 4px 24px rgba(168, 85, 247, 0.6),
                  0 0 40px rgba(233, 213, 255, 0.5);
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 4px solid rgba(255, 255, 255, 0.45);
      animation: target-pulse 1.2s ease-in-out infinite;
    }
    .target:active {
      transform: translate(-50%, -50%) scale(0.92);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.5),
                  0 2px 12px rgba(168, 85, 247, 0.8),
                  0 0 24px rgba(233, 213, 255, 0.6);
    }
    .target.hit {
      animation: target-hit 0.25s ease-out forwards;
    }
    @keyframes target-pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.35), 0 4px 24px rgba(168, 85, 247, 0.6), 0 0 40px rgba(233, 213, 255, 0.5); }
      50% { box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.25), 0 6px 28px rgba(168, 85, 247, 0.7), 0 0 50px rgba(233, 213, 255, 0.6); }
    }
    @keyframes target-hit {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    }
    .message {
      font-size: clamp(22px, 4.5vw, 28px);
      text-align: center;
      margin-top: 1rem;
      min-height: 2.5em;
      font-weight: 600;
    }
    .message.go {
      color: #a78bfa;
      text-shadow: 0 0 16px rgba(167, 139, 250, 0.5);
    }
    .message.miss {
      color: #f5d0fe;
      text-shadow: 0 0 12px rgba(245, 208, 254, 0.4);
    }
    .message.start {
      color: #c4b5fd;
    }
    .btn {
      margin-top: 1.5rem;
      padding: 1rem 2rem;
      font-size: clamp(22px, 4.5vw, 28px);
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      touch-action: manipulation;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .btn:hover {
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn.secondary {
      background: linear-gradient(135deg, #5b21b6, #4c1d95);
      box-shadow: 0 4px 20px rgba(59, 7, 100, 0.5);
      margin-top: 0.75rem;
    }
    .btn.secondary:hover {
      box-shadow: 0 6px 24px rgba(59, 7, 100, 0.6);
    }
    .instructions {
      font-size: clamp(18px, 3.5vw, 24px);
      text-align: center;
      max-width: 360px;
      margin-top: 1rem;
      opacity: 0.9;
      line-height: 1.45;
      color: #ddd6fe;
    }
    .high-score {
      font-size: clamp(18px, 3.5vw, 24px);
      margin-top: 0.5rem;
      color: #c4b5fd;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1>Tap Target</h1>
  <p class="subtitle">Tap the purple circle — it oinks! More time to play.</p>
  <div class="stats">
    <div class="stat-row"><span>Score</span><span id="score">0</span></div>
    <div class="stat-row"><span>Time left</span><span id="timer">—</span></div>
    <p class="high-score" id="highScore">Best: 0</p>
  </div>
  <div class="arena" id="arena">
    <div class="target" id="target" aria-label="Target"></div>
  </div>
  <p class="message start" id="message">Tap Start to play</p>
  <button class="btn" id="startBtn" type="button">Start game</button>
  <button class="btn secondary" id="againBtn" type="button" style="display: none;">Play again</button>
  <p class="instructions">Each tap oinks and scores 1. Round is 90 seconds. The target moves every 1.5s. Miss three in a row and the round ends.</p>

  <script>
    (function () {
      var arena = document.getElementById("arena");
      var target = document.getElementById("target");
      var scoreEl = document.getElementById("score");
      var timerEl = document.getElementById("timer");
      var highScoreEl = document.getElementById("highScore");
      var messageEl = document.getElementById("message");
      var startBtn = document.getElementById("startBtn");
      var againBtn = document.getElementById("againBtn");

      var score = 0;
      var highScore = parseInt(localStorage.getItem("tapTargetHighScore") || "0", 10);
      var timeLeft = 0;
      var timerId = null;
      var moveId = null;
      var missesInRow = 0;
      var running = false;
      var ROUND_SEC = 90;
      var MOVE_MS = 1500;
      var MAX_MISSES = 3;
      var audioCtx = null;

      function playOink() {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          var ctx = audioCtx;
          var t = ctx.currentTime;
          var osc1 = ctx.createOscillator();
          var osc2 = ctx.createOscillator();
          var gain = ctx.createGain();
          osc1.type = "sawtooth";
          osc2.type = "sawtooth";
          osc1.frequency.setValueAtTime(180, t);
          osc1.frequency.exponentialRampToValueAtTime(90, t + 0.06);
          osc2.frequency.setValueAtTime(220, t + 0.06);
          osc2.frequency.exponentialRampToValueAtTime(280, t + 0.14);
          gain.gain.setValueAtTime(0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(ctx.destination);
          osc1.start(t);
          osc1.stop(t + 0.08);
          osc2.start(t + 0.06);
          osc2.stop(t + 0.2);
        } catch (e) {}
      }

      function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function placeTarget() {
        target.classList.remove("hit");
        var r = 40;
        var w = arena.offsetWidth;
        var h = arena.offsetHeight;
        var x = rand(r, w - r);
        var y = rand(r, h - r);
        target.style.left = x + "px";
        target.style.top = y + "px";
        target.style.transform = "translate(-50%, -50%)";
      }

      function setMessage(text, className) {
        messageEl.textContent = text;
        messageEl.className = "message " + (className || "");
      }

      function updateUI() {
        scoreEl.textContent = score;
        timerEl.textContent = running ? timeLeft + "s" : "—";
        highScoreEl.textContent = "Best: " + highScore;
      }

      function saveHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem("tapTargetHighScore", String(highScore));
          updateUI();
        }
      }

      function endRound(won) {
        running = false;
        if (timerId) clearInterval(timerId);
        if (moveId) clearTimeout(moveId);
        timerId = null;
        moveId = null;
        saveHighScore();
        startBtn.style.display = "none";
        againBtn.style.display = "block";
        setMessage(
          won ? "Time's up! Score: " + score + (score === highScore && score > 0 ? " — New best!" : "") : "Three misses — round over. Score: " + score,
          won ? "go" : "miss"
        );
        updateUI();
      }

      function tick() {
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) {
          endRound(true);
        }
      }

      function scheduleMove() {
        if (!running) return;
        moveId = setTimeout(function () {
          if (!running) return;
          missesInRow++;
          setMessage("Miss! " + (MAX_MISSES - missesInRow) + " left", "miss");
          if (missesInRow >= MAX_MISSES) {
            endRound(false);
            return;
          }
          placeTarget();
          scheduleMove();
        }, MOVE_MS);
      }

      function onTargetTap(e) {
        e.preventDefault();
        if (!running) return;
        playOink();
        target.classList.add("hit");
        score++;
        missesInRow = 0;
        setMessage("Oink! +1", "go");
        updateUI();
        if (moveId) clearTimeout(moveId);
        setTimeout(function () {
          if (!running) return;
          placeTarget();
          scheduleMove();
        }, 220);
      }

      target.addEventListener("click", onTargetTap);
      target.addEventListener("touchend", function (e) {
        e.preventDefault();
        onTargetTap(e);
      }, { passive: false });

      startBtn.addEventListener("click", function () {
        score = 0;
        timeLeft = ROUND_SEC;
        missesInRow = 0;
        running = true;
        startBtn.style.display = "none";
        againBtn.style.display = "none";
        setMessage("Go!", "go");
        updateUI();
        placeTarget();
        timerId = setInterval(tick, 1000);
        scheduleMove();
      });

      againBtn.addEventListener("click", function () {
        againBtn.style.display = "none";
        startBtn.style.display = "block";
        setMessage("Tap Start to play", "start");
        scoreEl.textContent = "0";
        timerEl.textContent = "—";
        updateUI();
      });

      updateUI();
    })();
  </script>
</body>
</html>
