<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lukey Padukey — Future App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      font-size: 24px;
      line-height: 1.55;
      color: #f2f4f8;
      background: #0c1220;
      -webkit-text-size-adjust: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    main {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 2rem 1.35rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.35rem;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(99, 179, 237, 0.22), transparent 55%),
        linear-gradient(180deg, #0c1220 0%, #0a0f18 100%);
    }

    .badge {
      align-self: flex-start;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7dd3fc;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(125, 211, 252, 0.35);
      background: rgba(125, 211, 252, 0.08);
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .lead {
      font-size: 24px;
      color: #c8d4e8;
    }

    .card {
      margin-top: 0.25rem;
      padding: 1.25rem 1.2rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .card h2 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 0.65rem;
      color: #e8eef8;
    }

    .card p {
      font-size: 22px;
      color: #aeb9cc;
    }

    footer {
      margin-top: auto;
      padding-top: 1.5rem;
      font-size: 22px;
      color: #7a8699;
    }

    footer strong {
      color: #b8c5d9;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <span class="badge">Welcome</span>
    <h1>Hey, Lukey Padukey</h1>
    <p class="lead">
      This is your space for whatever you build next. When you are ready, your new app starts here.
    </p>
    <section class="card">
      <h2>Future app</h2>
      <p>
        Swap this page for your real product: add your name, your idea, and ship it one step at a time.
      </p>
    </section>
    <footer>
      <p><strong>Lukey Padukey</strong> — future app · built with care</p>
    </footer>
  </main>
</body>
</html>
