<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Batman Flap</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 22px;
      line-height: 1.5;
      color: #ffd700;
      background: #0a0a0a;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #title-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      z-index: 10;
    }
    #title-screen p {
      font-size: 24px;
      margin: 0 0 1rem 0;
      color: #ffd700;
    }
    #start-btn {
      font-size: 26px;
      padding: 0.75rem 1.5rem;
      background: #ffd700;
      color: #0a0a0a;
      border: 3px solid #ffd700;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #start-btn:active {
      transform: scale(0.98);
      box-shadow: 0 0 12px #ffd700;
    }
    #canvas-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      flex: 1;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 2px rgba(255, 215, 0, 0.4);
    }
    #game-canvas {
      display: block;
      height: 100%;
      width: auto;
      max-width: 100%;
      cursor: pointer;
      object-fit: contain;
    }
    #score-display {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: 700;
      color: #ffd700;
      text-shadow: 0 0 6px rgba(255, 215, 0, 0.8);
      z-index: 5;
      pointer-events: none;
    }
    #game-over-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.9);
      border: 4px solid #ffd700;
      border-radius: 12px;
      z-index: 10;
      min-width: 220px;
    }
    #game-over-panel.show {
      display: block;
    }
    #game-over-panel h2 {
      font-size: 28px;
      margin: 0 0 0.5rem 0;
      color: #ffd700;
    }
    #final-score {
      font-size: 36px;
      font-weight: 700;
      margin: 0 0 1rem 0;
      color: #ffd700;
    }
    #restart-btn {
      font-size: 24px;
      padding: 0.6rem 1.2rem;
      background: #ffd700;
      color: #0a0a0a;
      border: 3px solid #ffd700;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.1s;
    }
    #restart-btn:active {
      transform: scale(0.98);
    }
    #music-toggle {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 22px;
      padding: 0.4rem 0.8rem;
      background: transparent;
      color: #ffd700;
      border: 2px solid #ffd700;
      border-radius: 6px;
      cursor: pointer;
      z-index: 15;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="title-screen">
      <h1>Batman Flap</h1>
      <p>Tap to fly. Avoid stars, lasers & bullets.</p>
      <button id="start-btn">Start</button>
    </div>
    <div id="canvas-wrap" style="display: none;">
      <canvas id="game-canvas" width="560" height="600"></canvas>
      <div id="score-display">0</div>
      <div id="game-over-panel">
        <h2>Game Over</h2>
        <p id="final-score">0</p>
        <button id="restart-btn">Restart</button>
      </div>
    </div>
    <button id="music-toggle" style="display: none;">Sound: On</button>
  </div>
  <audio id="bg-music" loop preload="auto"></audio>

  <script>
    (function () {
      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');
      const canvasWrap = document.getElementById('canvas-wrap');
      const titleScreen = document.getElementById('title-screen');
      const startBtn = document.getElementById('start-btn');
      const scoreDisplay = document.getElementById('score-display');
      const gameOverPanel = document.getElementById('game-over-panel');
      const finalScoreEl = document.getElementById('final-score');
      const restartBtn = document.getElementById('restart-btn');
      const musicToggle = document.getElementById('music-toggle');
      const bgMusic = document.getElementById('bg-music');
      bgMusic.src = 'Batman%20Opening%20and%20Closing%20Theme%201966%20-%201968%20With%20Snippets.mp3';
      bgMusic.load();

      const GRAVITY = 0.35;
      const FLAP_STRENGTH = -8;
      const BASE_STAR_SPEED = 3;
      const BASE_STAR_SPAWN_INTERVAL = 90;
      const PLAYER_WIDTH = 36;
      const PLAYER_HEIGHT = 28;
      const STAR_RADIUS = 18;
      const GROUND_Y = canvas.height - 40;

      let gameState = 'title';
      let player = { x: 80, y: canvas.height / 2 - 20, vy: 0 };
      let obstacles = [];
      let score = 0;
      let hardnessLevel = 0;
      let starSpeed = BASE_STAR_SPEED;
      let starSpawnInterval = BASE_STAR_SPAWN_INTERVAL;
      let frameCount = 0;
      let animationId = null;
      let musicOn = true;
      let musicStarted = false;

      function drawBatmanLogo() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const w = 200;
        const h = 280;
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.ellipse(cx, cy, w, h, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.25)';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#0a0a0a';
        ctx.translate(cx, cy);
        ctx.scale(0.85, 0.85);
        ctx.beginPath();
        ctx.moveTo(0, -90);
        ctx.lineTo(-50, 50);
        ctx.lineTo(-25, 55);
        ctx.lineTo(0, 20);
        ctx.lineTo(25, 55);
        ctx.lineTo(50, 50);
        ctx.closePath();
        ctx.moveTo(0, 25);
        ctx.lineTo(-18, 75);
        ctx.lineTo(0, 65);
        ctx.lineTo(18, 75);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawBat(x, y) {
        ctx.save();
        ctx.translate(x + PLAYER_WIDTH / 2, y + PLAYER_HEIGHT / 2);
        const capeSway = Math.sin(frameCount * 0.4) * 0.2;
        ctx.rotate(capeSway);
        const s = 0.72;
        ctx.scale(s, s);

        ctx.fillStyle = '#0a0a0a';
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(-22, 12);
        ctx.lineTo(-24, 18);
        ctx.lineTo(-18, 16);
        ctx.lineTo(-14, 22);
        ctx.lineTo(-8, 14);
        ctx.lineTo(0, 18);
        ctx.lineTo(8, 14);
        ctx.lineTo(14, 22);
        ctx.lineTo(18, 16);
        ctx.lineTo(24, 18);
        ctx.lineTo(22, 12);
        ctx.lineTo(14, 8);
        ctx.lineTo(14, 0);
        ctx.lineTo(8, -4);
        ctx.lineTo(6, -12);
        ctx.lineTo(0, -18);
        ctx.lineTo(-6, -12);
        ctx.lineTo(-8, -4);
        ctx.lineTo(-14, 0);
        ctx.lineTo(-14, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(0, -4, 6, 8, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a';
        ctx.fill();
        ctx.strokeStyle = '#ffd700';
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(-3, -22);
        ctx.lineTo(0, -20);
        ctx.lineTo(3, -22);
        ctx.closePath();
        ctx.fillStyle = '#0a0a0a';
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, 2);
        ctx.lineTo(0, 6);
        ctx.lineTo(-2, 8);
        ctx.lineTo(0, 6);
        ctx.lineTo(2, 8);
        ctx.moveTo(-3, 4);
        ctx.lineTo(3, 4);
        ctx.moveTo(-2, 0);
        ctx.lineTo(-4, 6);
        ctx.lineTo(0, 4);
        ctx.lineTo(4, 6);
        ctx.lineTo(2, 0);
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        ctx.restore();
      }

      function drawStar(cx, cy, r) {
        ctx.save();
        ctx.fillStyle = '#ffd700';
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          const px = cx + r * Math.cos(angle);
          const py = cy + r * Math.sin(angle);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawLaserBeam(x, y, w, h) {
        ctx.save();
        const g = ctx.createLinearGradient(x, 0, x + w, 0);
        g.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
        g.addColorStop(0.5, '#ffd700');
        g.addColorStop(1, 'rgba(255, 215, 0, 0.3)');
        ctx.fillStyle = g;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
        ctx.restore();
      }

      function drawBullet(cx, cy, r) {
        ctx.save();
        ctx.fillStyle = '#ffd700';
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, r * 0.6, r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function spawnObstacles() {
        const count = 1 + Math.min(Math.floor(hardnessLevel / 10), 1);
        const types = ['star', 'laser', 'bullet'];
        const usedY = [];
        for (let i = 0; i < count; i++) {
          const type = types[Math.floor(Math.random() * types.length)];
          let y;
          let tries = 0;
          do {
            y = 80 + Math.random() * (canvas.height - 200);
            tries++;
          } while (tries < 20 && usedY.some(uy => Math.abs(uy - y) < 90));
          usedY.push(y);
          const offset = count === 1 ? 0 : (i * 30 - 15);
          const baseX = canvas.width + STAR_RADIUS + offset;
          if (type === 'star') {
            obstacles.push({ type: 'star', x: baseX, y: y, r: STAR_RADIUS, passed: false });
          } else if (type === 'laser') {
            const beamW = 10;
            const beamH = 60 + Math.random() * 80;
            obstacles.push({ type: 'laser', x: baseX, y: y, w: beamW, h: beamH, passed: false });
          } else {
            obstacles.push({ type: 'bullet', x: baseX, y: y, r: STAR_RADIUS * 0.7, passed: false });
          }
        }
      }

      function hitTest() {
        const px = player.x + PLAYER_WIDTH / 2;
        const py = player.y + PLAYER_HEIGHT / 2;
        const hitRadius = 14;

        for (const o of obstacles) {
          if (o.type === 'star' || o.type === 'bullet') {
            const dx = px - o.x;
            const dy = py - o.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < hitRadius + o.r) return true;
          } else if (o.type === 'laser') {
            const rx = o.x;
            const ry = o.y;
            const rw = o.w;
            const rh = o.h;
            if (px + hitRadius > rx && px - hitRadius < rx + rw && py + hitRadius > ry && py - hitRadius < ry + rh) return true;
          }
        }
        return false;
      }

      function gameLoop() {
        if (gameState !== 'playing') return;

        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawBatmanLogo();

        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        ctx.strokeStyle = '#ffd700';
        ctx.strokeRect(0, GROUND_Y, canvas.width, 4);

        player.vy += GRAVITY;
        player.y += player.vy;

        if (player.y <= 0) {
          player.y = 0;
          player.vy = 0;
        }
        if (player.y + PLAYER_HEIGHT >= GROUND_Y) {
          gameOver();
          return;
        }

        frameCount++;
        const interval = Math.floor(starSpawnInterval);
        if (interval > 0 && frameCount % interval === 0) spawnObstacles();

        for (let i = obstacles.length - 1; i >= 0; i--) {
          const o = obstacles[i];
          o.x -= starSpeed;
          const rightEdge = o.type === 'laser' ? o.x + o.w : o.x + o.r;
          if (rightEdge < player.x && !o.passed) {
            o.passed = true;
            score++;
            hardnessLevel += 3;
            scoreDisplay.textContent = score;
            starSpeed = Math.min(BASE_STAR_SPEED + hardnessLevel * 0.2, 9);
            starSpawnInterval = Math.floor(Math.max(BASE_STAR_SPAWN_INTERVAL - hardnessLevel * 1.2, 55));
          }
          if (rightEdge < 0) obstacles.splice(i, 1);
        }

        drawBat(player.x, player.y);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalAlpha = 1;
        for (const o of obstacles) {
          if (o.type === 'star') drawStar(o.x, o.y, o.r);
          else if (o.type === 'laser') drawLaserBeam(o.x, o.y, o.w, o.h);
          else if (o.type === 'bullet') drawBullet(o.x, o.y, o.r);
        }

        if (hitTest()) {
          gameOver();
          return;
        }

        animationId = requestAnimationFrame(gameLoop);
      }

      function startGame() {
        gameState = 'playing';
        player = { x: 80, y: canvas.height / 2 - 20, vy: 0 };
        obstacles = [];
        score = 0;
        hardnessLevel = 0;
        musicStarted = false;
        starSpeed = BASE_STAR_SPEED;
        starSpawnInterval = BASE_STAR_SPAWN_INTERVAL;
        frameCount = 0;
        scoreDisplay.textContent = '0';
        gameOverPanel.classList.remove('show');
        if (animationId) cancelAnimationFrame(animationId);
        startMusic();
        gameLoop();
      }

      function gameOver() {
        gameState = 'gameover';
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        finalScoreEl.textContent = score;
        gameOverPanel.classList.add('show');
      }

      function flap() {
        if (gameState === 'playing') {
          player.vy = FLAP_STRENGTH;
        }
      }

      function handleInput(e) {
        e.preventDefault();
        if (gameState === 'title') return;
        if (gameState === 'gameover') return;
        if (gameState === 'playing' && musicOn && !musicStarted) startMusic();
        flap();
      }

      canvas.addEventListener('click', handleInput);
      canvas.addEventListener('touchstart', handleInput, { passive: false });
      document.addEventListener('keydown', function (e) {
        if (e.code === 'Space') {
          e.preventDefault();
          if (gameState === 'playing') flap();
        }
      });

      startBtn.addEventListener('click', function () {
        titleScreen.style.display = 'none';
        canvasWrap.style.display = 'block';
        musicToggle.style.display = 'block';
        startGame();
      });

      restartBtn.addEventListener('click', function () {
        gameOverPanel.classList.remove('show');
        startGame();
      });

      function startMusic() {
        if (!musicOn) return;
        bgMusic.volume = 0.8;
        bgMusic.currentTime = 0;
        const p = bgMusic.play();
        if (p && typeof p.then === 'function') {
          p.then(function () { musicStarted = true; }).catch(function () {});
        } else {
          musicStarted = true;
        }
      }

      function stopMusic() {
        bgMusic.pause();
      }

      musicToggle.addEventListener('click', function () {
        musicOn = !musicOn;
        musicToggle.textContent = musicOn ? 'Sound: On' : 'Sound: Off';
        if (musicOn && gameState === 'playing') startMusic();
        else stopMusic();
      });
    })();
  </script>
</body>
</html>
