<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Batman Flap</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 22px;
      line-height: 1.5;
      color: #ffd700;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #title-screen {
      text-align: center;
      padding: 1.5rem;
      z-index: 10;
    }
    #title-screen p {
      font-size: 24px;
      margin: 0 0 1rem 0;
      color: #ffd700;
    }
    #start-btn {
      font-size: 26px;
      padding: 0.75rem 1.5rem;
      background: #ffd700;
      color: #0a0a0a;
      border: 3px solid #ffd700;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #start-btn:active {
      transform: scale(0.98);
      box-shadow: 0 0 12px #ffd700;
    }
    #canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 400px;
      background: #0a0a0a;
      border: 4px solid #ffd700;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
    }
    #score-display {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: 700;
      color: #ffd700;
      text-shadow: 0 0 6px rgba(255, 215, 0, 0.8);
      z-index: 5;
      pointer-events: none;
    }
    #game-over-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.9);
      border: 4px solid #ffd700;
      border-radius: 12px;
      z-index: 10;
      min-width: 220px;
    }
    #game-over-panel.show {
      display: block;
    }
    #game-over-panel h2 {
      font-size: 28px;
      margin: 0 0 0.5rem 0;
      color: #ffd700;
    }
    #final-score {
      font-size: 36px;
      font-weight: 700;
      margin: 0 0 1rem 0;
      color: #ffd700;
    }
    #restart-btn {
      font-size: 24px;
      padding: 0.6rem 1.2rem;
      background: #ffd700;
      color: #0a0a0a;
      border: 3px solid #ffd700;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.1s;
    }
    #restart-btn:active {
      transform: scale(0.98);
    }
    #music-toggle {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 22px;
      padding: 0.4rem 0.8rem;
      background: transparent;
      color: #ffd700;
      border: 2px solid #ffd700;
      border-radius: 6px;
      cursor: pointer;
      z-index: 15;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="title-screen">
      <h1>Batman Flap</h1>
      <p>Tap to fly. Avoid the stars.</p>
      <button id="start-btn">Start</button>
    </div>
    <div id="canvas-wrap" style="display: none;">
      <canvas id="game-canvas" width="400" height="600"></canvas>
      <div id="score-display">0</div>
      <div id="game-over-panel">
        <h2>Game Over</h2>
        <p id="final-score">0</p>
        <button id="restart-btn">Restart</button>
      </div>
    </div>
    <button id="music-toggle" style="display: none;">Sound: On</button>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');
      const canvasWrap = document.getElementById('canvas-wrap');
      const titleScreen = document.getElementById('title-screen');
      const startBtn = document.getElementById('start-btn');
      const scoreDisplay = document.getElementById('score-display');
      const gameOverPanel = document.getElementById('game-over-panel');
      const finalScoreEl = document.getElementById('final-score');
      const restartBtn = document.getElementById('restart-btn');
      const musicToggle = document.getElementById('music-toggle');

      const GRAVITY = 0.35;
      const FLAP_STRENGTH = -8;
      const BASE_STAR_SPEED = 3;
      const BASE_STAR_SPAWN_INTERVAL = 90;
      const PLAYER_WIDTH = 36;
      const PLAYER_HEIGHT = 28;
      const STAR_RADIUS = 18;
      const GROUND_Y = canvas.height - 40;

      let gameState = 'title';
      let player = { x: 80, y: canvas.height / 2 - 20, vy: 0 };
      let stars = [];
      let score = 0;
      let starSpeed = BASE_STAR_SPEED;
      let starSpawnInterval = BASE_STAR_SPAWN_INTERVAL;
      let frameCount = 0;
      let animationId = null;
      let musicOn = true;
      let audioCtx = null;
      let musicInterval = null;

      function drawBat(x, y) {
        ctx.save();
        ctx.translate(x + PLAYER_WIDTH / 2, y + PLAYER_HEIGHT / 2);
        ctx.fillStyle = '#0a0a0a';
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;

        const wingFlap = Math.sin(frameCount * 0.4) * 0.3;
        ctx.rotate(wingFlap);

        ctx.beginPath();
        ctx.ellipse(0, 0, 10, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-18, 2);
        ctx.quadraticCurveTo(-28, -8, -22, -14);
        ctx.quadraticCurveTo(-12, -4, -18, 2);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(18, 2);
        ctx.quadraticCurveTo(28, -8, 22, -14);
        ctx.quadraticCurveTo(12, -4, 18, 2);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(6, -8, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawStar(cx, cy, r) {
        ctx.save();
        ctx.fillStyle = '#ffd700';
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          const px = cx + r * Math.cos(angle);
          const py = cy + r * Math.sin(angle);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function spawnStar() {
        const y = 80 + Math.random() * (canvas.height - 200);
        stars.push({
          x: canvas.width + STAR_RADIUS,
          y: y,
          r: STAR_RADIUS,
          passed: false
        });
      }

      function hitTest() {
        const px = player.x + PLAYER_WIDTH / 2;
        const py = player.y + PLAYER_HEIGHT / 2;
        const hitRadius = 14;

        for (const s of stars) {
          const dx = px - s.x;
          const dy = py - s.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < hitRadius + s.r) return true;
        }
        return false;
      }

      function gameLoop() {
        if (gameState !== 'playing') return;

        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        ctx.strokeStyle = '#ffd700';
        ctx.strokeRect(0, GROUND_Y, canvas.width, 4);

        player.vy += GRAVITY;
        player.y += player.vy;

        if (player.y <= 0) {
          player.y = 0;
          player.vy = 0;
        }
        if (player.y + PLAYER_HEIGHT >= GROUND_Y) {
          gameOver();
          return;
        }

        frameCount++;
        if (frameCount % starSpawnInterval === 0) spawnStar();

        for (let i = stars.length - 1; i >= 0; i--) {
          const s = stars[i];
          s.x -= starSpeed;
          if (s.x + s.r < player.x && !s.passed) {
            s.passed = true;
            score++;
            scoreDisplay.textContent = score;
            starSpeed = Math.min(BASE_STAR_SPEED + score * 0.35, 8);
            starSpawnInterval = Math.max(BASE_STAR_SPAWN_INTERVAL - score * 5, 40);
          }
          if (s.x + s.r < 0) stars.splice(i, 1);
        }

        for (const s of stars) drawStar(s.x, s.y, s.r);
        drawBat(player.x, player.y);

        if (hitTest()) {
          gameOver();
          return;
        }

        animationId = requestAnimationFrame(gameLoop);
      }

      function startGame() {
        gameState = 'playing';
        player = { x: 80, y: canvas.height / 2 - 20, vy: 0 };
        stars = [];
        score = 0;
        starSpeed = BASE_STAR_SPEED;
        starSpawnInterval = BASE_STAR_SPAWN_INTERVAL;
        frameCount = 0;
        scoreDisplay.textContent = '0';
        gameOverPanel.classList.remove('show');
        if (animationId) cancelAnimationFrame(animationId);
        startMusic();
        gameLoop();
      }

      function gameOver() {
        gameState = 'gameover';
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        finalScoreEl.textContent = score;
        gameOverPanel.classList.add('show');
      }

      function flap() {
        if (gameState === 'playing') {
          player.vy = FLAP_STRENGTH;
        }
      }

      function handleInput(e) {
        e.preventDefault();
        if (gameState === 'title') return;
        if (gameState === 'gameover') return;
        flap();
      }

      canvas.addEventListener('click', handleInput);
      canvas.addEventListener('touchstart', handleInput, { passive: false });
      document.addEventListener('keydown', function (e) {
        if (e.code === 'Space') {
          e.preventDefault();
          if (gameState === 'playing') flap();
        }
      });

      startBtn.addEventListener('click', function () {
        titleScreen.style.display = 'none';
        canvasWrap.style.display = 'block';
        musicToggle.style.display = 'block';
        startGame();
      });

      restartBtn.addEventListener('click', function () {
        gameOverPanel.classList.remove('show');
        startGame();
      });

      function startMusic() {
        if (!musicOn || musicInterval) return;
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') audioCtx.resume();

          const playNote = (freq, startTime, duration, vol) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'triangle';
            gain.gain.setValueAtTime(vol || 0.12, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc.start(startTime);
            osc.stop(startTime + duration);
          };

          const riff = [
            { f: 261.63, t: 0 },
            { f: 329.63, t: 0.12 },
            { f: 392, t: 0.24 },
            { f: 349.23, t: 0.36 },
            { f: 261.63, t: 0.5 },
            { f: 293.66, t: 0.62 },
            { f: 349.23, t: 0.74 },
            { f: 392, t: 0.86 }
          ];
          const beat = () => {
            if (gameState !== 'playing' && gameState !== 'gameover') return;
            const t = audioCtx.currentTime;
            riff.forEach((n) => playNote(n.f, t + n.t, 0.14, 0.14));
          };

          beat();
          musicInterval = setInterval(beat, 1000);
        } catch (err) {}
      }

      function stopMusic() {
        if (musicInterval) {
          clearInterval(musicInterval);
          musicInterval = null;
        }
      }

      musicToggle.addEventListener('click', function () {
        musicOn = !musicOn;
        musicToggle.textContent = musicOn ? 'Sound: On' : 'Sound: Off';
        if (musicOn && gameState === 'playing') startMusic();
        else stopMusic();
      });
    })();
  </script>
</body>
</html>
