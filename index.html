<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Julian Project 1 — Tap Target 3D</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f0a1a;
      color: #f0e6ff;
    }
    .scene {
      position: fixed;
      inset: 0;
      perspective: 1400px;
      perspective-origin: 50% 50%;
      overflow: hidden;
    }
    .world {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform: translateZ(0);
    }
    .dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 140px;
      height: 140px;
      margin-left: -70px;
      margin-top: -70px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 32%, #e9d5ff, #a855f7 45%, #6d28d9 70%, #4c1d95);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.35),
                  0 0 60px 20px rgba(168, 85, 247, 0.5),
                  inset -8px -12px 24px rgba(0, 0, 0, 0.3),
                  inset 6px 8px 16px rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transform-style: preserve-3d;
      backface-visibility: visible;
      pointer-events: auto;
      border: 4px solid rgba(255, 255, 255, 0.4);
    }
    .dot:active {
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.5),
                  0 0 40px 12px rgba(168, 85, 247, 0.7),
                  inset -8px -12px 24px rgba(0, 0, 0, 0.35);
    }
    .dot.hit {
      opacity: 0;
      transform: translate(-50%, -50%) translateZ(var(--z, -3000px)) scale(1.4);
      transition: opacity 0.15s ease-out, transform 0.15s ease-out;
    }
    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(1rem, 4vw, 2rem);
      z-index: 10;
    }
    .overlay > * {
      pointer-events: auto;
    }
    .stats {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      background: rgba(30, 10, 50, 0.75);
      padding: 0.75rem 1.25rem;
      border-radius: 16px;
      border: 2px solid rgba(192, 132, 252, 0.3);
      margin-bottom: 1rem;
      backdrop-filter: blur(8px);
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 1.5rem;
      font-size: clamp(22px, 4.5vw, 28px);
      font-weight: 600;
    }
    .stat-row span:last-child {
      color: #c4b5fd;
      text-shadow: 0 0 12px rgba(196, 181, 253, 0.5);
    }
    .high-score {
      font-size: clamp(18px, 3.5vw, 24px);
      color: #c4b5fd;
      opacity: 0.95;
    }
    .message {
      font-size: clamp(22px, 4.5vw, 28px);
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.8em;
      font-weight: 600;
    }
    .message.go { color: #a78bfa; text-shadow: 0 0 16px rgba(167, 139, 250, 0.5); }
    .message.miss { color: #f5d0fe; text-shadow: 0 0 12px rgba(245, 208, 254, 0.4); }
    .message.start { color: #c4b5fd; }
    .btn {
      margin-top: 1rem;
      padding: 1rem 2rem;
      font-size: clamp(22px, 4.5vw, 28px);
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5);
      touch-action: manipulation;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .btn:hover { box-shadow: 0 6px 28px rgba(124, 58, 237, 0.6); }
    .btn:active { transform: scale(0.98); }
    .btn.secondary {
      background: linear-gradient(135deg, #5b21b6, #4c1d95);
      box-shadow: 0 4px 20px rgba(59, 7, 100, 0.5);
      margin-top: 0.5rem;
    }
    .btn.secondary:hover { box-shadow: 0 6px 24px rgba(59, 7, 100, 0.6); }
    .instructions {
      font-size: clamp(18px, 3.5vw, 24px);
      text-align: center;
      max-width: 420px;
      margin-top: 1rem;
      opacity: 0.9;
      line-height: 1.4;
      color: #ddd6fe;
    }
    .tap-zone {
      position: fixed;
      inset: 0;
      z-index: 5;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="world" id="world">
      <div class="dot" id="dot" aria-label="Target"></div>
    </div>
  </div>
  <div class="tap-zone" id="tapZone" style="display: none;"></div>
  <div class="overlay">
    <div class="stats">
      <div class="stat-row"><span>Score</span><span id="score">0</span></div>
      <div class="stat-row"><span>Time left</span><span id="timer">—</span></div>
      <p class="high-score" id="highScore">Best: 0</p>
    </div>
    <p class="message start" id="message">Tap Start — the dot comes at you from far away. Tap it!</p>
    <button class="btn" id="startBtn" type="button">Start game</button>
    <button class="btn secondary" id="againBtn" type="button" style="display: none;">Play again</button>
    <p class="instructions">Full screen 3D. The purple dot rushes toward you from the distance. Tap when it’s close to score. 90s round. Miss three in a row to lose.</p>
  </div>

  <script>
    (function () {
      var dot = document.getElementById("dot");
      var world = document.getElementById("world");
      var tapZone = document.getElementById("tapZone");
      var scoreEl = document.getElementById("score");
      var timerEl = document.getElementById("timer");
      var highScoreEl = document.getElementById("highScore");
      var messageEl = document.getElementById("message");
      var startBtn = document.getElementById("startBtn");
      var againBtn = document.getElementById("againBtn");

      var score = 0;
      var highScore = parseInt(localStorage.getItem("tapTargetHighScore") || "0", 10);
      var timeLeft = 0;
      var timerId = null;
      var animId = null;
      var missesInRow = 0;
      var running = false;
      var ROUND_SEC = 90;
      var MAX_MISSES = 3;
      var audioCtx = null;

      var dotZ = -8000;
      var dotSpeed = 0;
      var DOT_START_Z = -8000;
      var DOT_END_Z = 0;
      var TRAVEL_MS = 4200;
      var HIT_Z_MIN = -400;
      var HIT_Z_MAX = 50;

      function playOink() {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          var ctx = audioCtx;
          var t = ctx.currentTime;
          var osc1 = ctx.createOscillator();
          var osc2 = ctx.createOscillator();
          var gain = ctx.createGain();
          osc1.type = "sawtooth";
          osc2.type = "sawtooth";
          osc1.frequency.setValueAtTime(180, t);
          osc1.frequency.exponentialRampToValueAtTime(90, t + 0.06);
          osc2.frequency.setValueAtTime(220, t + 0.06);
          osc2.frequency.exponentialRampToValueAtTime(280, t + 0.14);
          gain.gain.setValueAtTime(0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(ctx.destination);
          osc1.start(t);
          osc1.stop(t + 0.08);
          osc2.start(t + 0.06);
          osc2.stop(t + 0.2);
        } catch (e) {}
      }

      function setMessage(text, className) {
        messageEl.textContent = text;
        messageEl.className = "message " + (className || "");
      }

      function updateUI() {
        scoreEl.textContent = score;
        timerEl.textContent = running ? timeLeft + "s" : "—";
        highScoreEl.textContent = "Best: " + highScore;
      }

      function saveHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem("tapTargetHighScore", String(highScore));
          updateUI();
        }
      }

      function setDotZ(z) {
        dotZ = z;
        dot.style.transform = "translate(-50%, -50%) translateZ(" + z + "px)";
        dot.style.setProperty("--z", z + "px");
      }

      function spawnDot() {
        dot.classList.remove("hit");
        dot.style.transition = "none";
        setDotZ(DOT_START_Z);
        dotSpeed = (DOT_END_Z - DOT_START_Z) / TRAVEL_MS;
      }

      function endRound(won) {
        running = false;
        if (timerId) clearInterval(timerId);
        if (animId) cancelAnimationFrame(animId);
        timerId = null;
        animId = null;
        tapZone.style.display = "none";
        saveHighScore();
        startBtn.style.display = "none";
        againBtn.style.display = "block";
        setMessage(
          won ? "Time's up! Score: " + score + (score === highScore && score > 0 ? " — New best!" : "") : "Three misses — round over. Score: " + score,
          won ? "go" : "miss"
        );
        updateUI();
      }

      function tick() {
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) endRound(true);
      }

      function animate(timestamp) {
        if (!running) return;
        if (dot.classList.contains("hit")) {
          animId = requestAnimationFrame(animate);
          return;
        }
        var dt = 16;
        if (typeof timestamp === "number" && dot.lastFrame != null) dt = Math.min(timestamp - dot.lastFrame, 50);
        dot.lastFrame = timestamp;
        var nextZ = dotZ + dotSpeed * dt;
        if (nextZ >= DOT_END_Z) {
          nextZ = DOT_END_Z;
          missesInRow++;
          setMessage("Miss! " + (MAX_MISSES - missesInRow) + " left", "miss");
          if (missesInRow >= MAX_MISSES) {
            endRound(false);
            return;
          }
          spawnDot();
        } else {
          setDotZ(nextZ);
        }
        animId = requestAnimationFrame(animate);
      }

      function onTap(e) {
        e.preventDefault();
        if (!running) return;
        if (dotZ >= HIT_Z_MIN && dotZ <= HIT_Z_MAX) {
          playOink();
          dot.classList.add("hit");
          dot.style.transition = "opacity 0.15s ease-out, transform 0.15s ease-out";
          score++;
          missesInRow = 0;
          setMessage("Oink! +1", "go");
          updateUI();
          setTimeout(function () {
            if (!running) return;
            spawnDot();
          }, 180);
        }
      }

      tapZone.addEventListener("click", onTap);
      tapZone.addEventListener("touchend", function (e) {
        e.preventDefault();
        onTap(e);
      }, { passive: false });

      startBtn.addEventListener("click", function () {
        score = 0;
        timeLeft = ROUND_SEC;
        missesInRow = 0;
        running = true;
        startBtn.style.display = "none";
        againBtn.style.display = "none";
        tapZone.style.display = "block";
        setMessage("Go! Tap the dot as it comes at you", "go");
        updateUI();
        spawnDot();
        timerId = setInterval(tick, 1000);
        dot.lastFrame = null;
        animId = requestAnimationFrame(animate);
      });

      againBtn.addEventListener("click", function () {
        againBtn.style.display = "none";
        startBtn.style.display = "block";
        setMessage("Tap Start — the dot comes at you from far away. Tap it!", "start");
        scoreEl.textContent = "0";
        timerEl.textContent = "—";
        updateUI();
      });

      updateUI();
    })();
  </script>
</body>
</html>
